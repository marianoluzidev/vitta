<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <!--
  Customize this policy to fit your own app's needs. For more guidance, please refer to the docs:
      https://cordova.apache.org/docs/en/latest/
  Some notes:
    * https://ssl.gstatic.com is required only on Android and is needed for TalkBack to function properly
    * Disables use of inline scripts in order to mitigate risk of XSS vulnerabilities. To change this:
      * Enable inline JS: add 'unsafe-inline' to default-src
  -->
  <meta http-equiv="Content-Security-Policy" content="default-src * 'self' 'unsafe-inline' 'unsafe-eval' data: content: blob:; worker-src 'self' blob:;">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">

  <meta name="theme-color" content="#fff">
  <meta name="format-detection" content="telephone=no">
  <meta name="msapplication-tap-highlight" content="no">
  <title>Vitta</title>
  
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <!-- Iconos + manifest por tenant (patrón GymWox): mismas URLs antes de la SPA para PWA / “Añadir a inicio” -->
  <link rel="apple-touch-icon" href="/branding/amatebien/icons/apple-touch-icon.png" id="vitta-apple-touch-icon">
  <link rel="icon" href="/branding/amatebien/icons/favicon.png" id="vitta-favicon">
  <script>
    (function () {
      var path = location.pathname || '/';
      var m = path.match(/\/t\/([^/]+)(?:\/|$)/);
      var tid = m && m[1] ? decodeURIComponent(m[1]) : null;
      var manifestHref = tid ? '/branding/' + encodeURIComponent(tid) + '/manifest.json' : '/manifest.json';
      var iconBase = tid ? '/branding/' + encodeURIComponent(tid) + '/icons' : '/branding/amatebien/icons';
      var prev = document.getElementById('vitta-web-manifest');
      if (prev) prev.remove();
      var mlink = document.createElement('link');
      mlink.id = 'vitta-web-manifest';
      mlink.rel = 'manifest';
      mlink.href = manifestHref;
      document.head.appendChild(mlink);
      var apple = document.getElementById('vitta-apple-touch-icon');
      if (apple) apple.setAttribute('href', iconBase + '/apple-touch-icon.png');
      var fav = document.getElementById('vitta-favicon');
      if (fav) fav.setAttribute('href', iconBase + '/favicon.png');
    })();
  </script>
  
  <!-- built styles file will be auto injected -->
</head>
<body>
  <div id="app"></div>
  
  <script type="module" src="/js/app.js"></script>
</body>
</html>
